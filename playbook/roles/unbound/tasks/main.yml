---
  - name: Configure unbound
    copy: src="unbound.conf" dest="/etc/unbound/unbound.conf" mode=0644 owner=root group=root
    notify: [ 'Restart unbound' ]
  - name: Configure resolv.conf.d/base
    copy: src="resolv.conf.d.base" dest="/etc/resolvconf/resolv.conf.d/base" mode=0644 owner=root group=root
    notify: [ 'resolvconf update' ]
  - name: Assure unbound is used
    ansible.builtin.systemd_service:
      enabled: true
      masked: false
      name: unbound
  - name: Assure systemd-resolved is not used
    ansible.builtin.systemd_service:
      enabled: false
      state: stopped
      masked: true
      name: systemd-resolved
