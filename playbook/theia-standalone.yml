- name: a play that runs entirely on the ansible host
  hosts: 127.0.0.1
  connection: local

  vars:
    software_release_url: https://lab.nexedi.com/nexedi/slapos/-/raw/1.0.477/software/theia/software.cfg
    startup_playbook_id: theia-standalone.yml
    playbook_name: theia
    request_instance_template: request-theia.j2
    request_frontend_template: request-erp5-frontend.j2
    slapos_local_partition_amount: 3
  roles:
    - standalone-shared
