- name: a play that runs entirely on the ansible host
  hosts: 127.0.0.1
  connection: local

  vars:
    software_release_url: https://lab.node.vifib.com/nexedi/slapos/-/raw/1.0.477/software/theia/software.cfg
    startup_playbook_id: theia-standalone.yml
    playbook_name: theia-nested-slapos-master
    request_instance_template: request-theia-nested.j2
    slapos_local_partition_amount: 1
    nested_software_release_url: https://lab.node.vifib.com/nexedi/slapos/-/raw/1.0.477/software/slapos-master/software.cfg
    nested_software_type: default
    nested_software_parameter_file: slapos-master-parameter.json
  roles:
    - standalone-shared
    - { role: package, package_name: socat, package_state: present }

